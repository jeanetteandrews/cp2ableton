<!DOCTYPE html>
<html lang="en">
<head>
  <title>Circuit Playground 2 Ableton</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cp_express.css">
</head>
<body>
  <h3>1. Connect Circuit Playground</h3>
  <button id="ble1">Controller 1</button>
  <span id="status1" class="status disconnected">Disconnected</span>
  <button id="ble2">Controller 2</button>
  <span id="status2" class="status disconnected">Disconnected</span>
  <br/><br/><br/>

  <div id="cc-setup">
    <h3>2. Connect to Ableton</h3>
    <h4>Controller 1:</h4>
    <div class="cc-control">
      <button class="cc-button" data-cc="1X">X &nbsp;(CC 11)</button>
      <div class="cc-display" id="display-1X"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <div class="cc-control">
      <button class="cc-button" data-cc="1Y">Y &nbsp;(CC 12)</button>
      <div class="cc-display" id="display-1Y"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <div class="cc-control">
      <button class="cc-button" data-cc="1Z">Z &nbsp;(CC 13)</button>
      <div class="cc-display" id="display-1Z"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <h4>Controller 2:</h4>
    <div class="cc-control">
      <button class="cc-button" data-cc="2X">X &nbsp;(CC 21)</button>
      <div class="cc-display" id="display-2X"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <div class="cc-control">
      <button class="cc-button" data-cc="2Y">Y &nbsp;(CC 22)</button>
      <div class="cc-display" id="display-2Y"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <div class="cc-control">
      <button class="cc-button" data-cc="2Z">Z &nbsp;(CC 23)</button>
      <div class="cc-display" id="display-2Z"><span class="raw-val">--</span> | CC: <span class="cc-val">--</span></div>
    </div>
    <br/><br/><br/>
    <h3>3. Start</h3>
    <button class="cc-button" data-cc="all">Send all CCs</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
